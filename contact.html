    <div class="contactpage">
        <div class="contacthead">
        <h1 class="contactheadlina1">Get In Touch</h1>
        <h1 class="contactheadline2">Have a question or feedback? We'd love to hear from you.</h1>
        </div>
   <form>
      <div class="seccontactus">
         <h2 class="send1" >Send US a Message</h2>
        <label for="name" class="lab1"> Name</label>
        <input type="text" name="name"class="lab2" placeholder="Enter your full name" required>
        
        <label for="email" class="lab3">Email </label>
        <input type="email" name="email"  class="lab4" placeholder="your@email.com" required>
        
        <label for="Age" class="age">Age</label>
        <input type="number" min="18" max="100" size="7" value="18:100" class="age2" placeholder="your age">

        <label for="Message" class="mass">Message :</label>
        <textarea name="Message" rows="2" cols="40" maxlength="200"
         placeholder="Write your Message..." class="mass2"></textarea>
       
         <button type="submit" class="send"> Send Message</button>
       </div>
   </form>
